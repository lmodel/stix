      the digits ''0'' through ''9'' and the letters ''a'' through ''f''. In order
      to allow pattern matching on custom objects, all properties that use the hex
      type, the property name MUST end with ''_hex''. '
    comments:
    - 'jsonschema_type: string jsonschema_pattern: "^([a-fA-F0-9]{2})+$" jsonschema_source:
      https://github.com/oasis-open/cti-stix2-json-schemas/tree/master/schemas/common/hex.json'
