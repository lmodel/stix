    name: Bundle
    definition_uri: https://w3id.org/lmodel/stix/Bundle
    description: 'A Bundle is a collection of arbitrary STIX Objects and Marking Definitions
      grouped together in a single container. '
    notes:
    - JSON Schema defines bundle objects as a heterogeneous anyOf/oneOf set including
      custom objects.
    comments:
    - 'jsonschema_rule: anyOf+oneOf validator_hint: validate-bundle-object-members
      jsonschema_source: https://github.com/oasis-open/cti-stix2-json-schemas/tree/master/schemas/common/bundle.json'
    in_subset:
    - common
    from_schema: https://w3id.org/lmodel/stix
    is_a: CommonSchemaComponent
    slots:
    - name
    - description
    - Bundle_type
    - Bundle_id
    - Bundle_bundle_objects
    slot_usage:
      type:
        name: type
        required: true
        pattern: ^bundle$
      id:
        name: id
        required: true
        pattern: ^bundle--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
      bundle_objects:
        name: bundle_objects
        comments:
        - 'jsonschema_minItems: "1"'
    class_uri: stix:Bundle
  Core:
    name: Core
    definition_uri: https://w3id.org/lmodel/stix/Core
    description: 'Common properties and behavior across all STIX Domain Objects and
      STIX Relationship Objects. '
    comments:
    - 'jsonschema_source: https://github.com/oasis-open/cti-stix2-json-schemas/tree/master/schemas/common/core.json'
    in_subset:
    - common
    from_schema: https://w3id.org/lmodel/stix
    is_a: CommonSchemaComponent
    abstract: true
    slots:
    - name
    - description
    - Core_type
    - Core_spec_version
    - Core_id
    - Core_created
    - Core_modified
    - created_by_ref
    - Core_labels
    - revoked
    - confidence
    - lang
    - Core_external_references
    - Core_object_marking_refs
    - Core_granular_markings
    - extensions
    slot_usage:
      type:
        name: type
        required: true
      spec_version:
        name: spec_version
        required: true
      id:
        name: id
        required: true
      created:
        name: created
        notes:
        - STIX core timestamps require millisecond precision.
        required: true
        pattern: T\d{2}:\d{2}:\d{2}\.\d{3,}Z$
      modified:
        name: modified
        notes:
        - STIX core timestamps require millisecond precision.
        required: true
        pattern: T\d{2}:\d{2}:\d{2}\.\d{3,}Z$
      labels:
        name: labels
        comments:
        - 'jsonschema_minItems: "1"'
      external_references:
        name: external_references
        comments:
        - 'jsonschema_minItems: "1"'
      object_marking_refs:
        name: object_marking_refs
        comments:
        - 'jsonschema_minItems: "1"'
      granular_markings:
        name: granular_markings
        comments:
        - 'jsonschema_minItems: "1"'
