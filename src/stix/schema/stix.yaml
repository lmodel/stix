  IdentityClassOv:
    description: "Open vocabulary for identity class (identity-class-ov). Additional string values are allowed."
    annotations:
      open_vocabulary: "true"
    permissible_values:
      individual:
      group:
      system:
      organization:
      class:
      unknown:

  IndustrySectorOv:
