      kavi:

  # ── Closed Vocabulary Enums for Extension Sub-Classes ──────────────────────
  WindowsIntegrityLevelEnum:
    description: "Windows process integrity level (trustworthiness) enumeration."
    permissible_values:
      low:
      medium:
      high:
      system:

  WindowsServiceStartEnum:
    description: "Windows service start type enumeration."
    permissible_values:
      SERVICE_AUTO_START:
      SERVICE_BOOT_START:
      SERVICE_DEMAND_START:
      SERVICE_DISABLED:
      SERVICE_SYSTEM_ALERT:

  WindowsServiceTypeEnum:
    description: "Windows service type enumeration."
    permissible_values:
      SERVICE_KERNEL_DRIVER:
      SERVICE_FILE_SYSTEM_DRIVER:
      SERVICE_WIN32_OWN_PROCESS:
