    range: string
    annotations:
      jsonschema_format: hex
  size_of_stack_reserve:
    description: "Specifies the size of the stack to reserve."
    range: integer
    minimum_value: 0
  size_of_stack_commit:
    description: "Specifies the size of the stack to commit."
    range: integer
    minimum_value: 0
  size_of_heap_reserve:
    description: "Specifies the size of the local heap space to reserve."
    range: integer
    minimum_value: 0
  size_of_heap_commit:
    description: "Specifies the size of the local heap space to commit."
    range: integer
    minimum_value: 0
  loader_flags_hex:
    description: "Specifies the reserved loader flags."
    range: string
    annotations:
      jsonschema_format: hex
  number_of_rva_and_sizes:
    description: "Specifies the number of data-directory entries in the remainder of the optional header."
    range: integer
    minimum_value: 0
classes:
  StixEntity:
    abstract: true
    slots:
      - id
      - type
      - name
      - description

  CommonSchemaComponent:
    abstract: true
    is_a: StixEntity

  CyberObservableObject:
    abstract: true
    is_a: CyberObservableCore

  StixDomainObject:
    abstract: true
    is_a: Core

  StixRelationshipObject:
    abstract: true
    is_a: Core

  Binary:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "The ​binary data type represents a sequence of bytes. In order to allow pattern matching on custom objects, for all properties that use the binary type, the property name MUST end with '_bin'. The JSON MTI serialization represents this as a base64-­encoded string as specified in RFC4648​. Other serializations SHOULD use a native binary type, if available. "
    annotations:
      jsonschema_type: string
      jsonschema_pattern: "^([A-Za-z0-9+/]{4})*([A-Za-z0-9+/]{4}|[A-Za-z0-9+/]{3}=|[A-Za-z0-9+/]{2}==)$"
      jsonschema_source: schemas/common/binary.json

  Bundle:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "A Bundle is a collection of arbitrary STIX Objects and Marking Definitions grouped together in a single container. "
    slots:
      - type
      - id
      - bundle_objects
    slot_usage:
      type:
        required: true
        pattern: "^bundle$"
      id:
        required: true
        pattern: "^bundle--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      bundle_objects:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - JSON Schema defines bundle objects as a heterogeneous anyOf/oneOf set including custom objects.
    annotations:
      jsonschema_rule: anyOf+oneOf
      validator_hint: validate-bundle-object-members
      jsonschema_source: schemas/common/bundle.json

  Core:
    abstract: true
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Common properties and behavior across all STIX Domain Objects and STIX Relationship Objects. "
    slots:
      - type
      - spec_version
      - id
      - created
      - modified
      - created_by_ref
      - labels
      - revoked
      - confidence
      - lang
      - external_references
      - object_marking_refs
      - granular_markings
      - extensions
    slot_usage:
      type:
        required: true
      spec_version:
        required: true
      id:
        required: true
      created:
        required: true
        pattern: "T\\d{2}:\\d{2}:\\d{2}\\.\\d{3,}Z$"
        notes:
          - STIX core timestamps require millisecond precision.
      modified:
        required: true
        pattern: "T\\d{2}:\\d{2}:\\d{2}\\.\\d{3,}Z$"
        notes:
          - STIX core timestamps require millisecond precision.
      labels:
        annotations:
          jsonschema_minItems: "1"
      external_references:
        annotations:
          jsonschema_minItems: "1"
      object_marking_refs:
        annotations:
          jsonschema_minItems: "1"
      granular_markings:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/common/core.json

  CyberObservableCore:
    abstract: true
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Common properties and behavior across all Cyber Observable Objects. "
    slots:
      - type
      - spec_version
      - id
      - object_marking_refs
      - granular_markings
      - defanged
      - extensions
    slot_usage:
      type:
        required: true
      spec_version:
        required: true
      id:
        required: true
      object_marking_refs:
        annotations:
          jsonschema_minItems: "1"
      granular_markings:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/common/cyber-observable-core.json

  Dictionary:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "A dictionary captures a set of key/value pairs "
    annotations:
      jsonschema_source: schemas/common/dictionary.json

  ExtensionDefinition:
    is_a: Core
    in_subset:
      - common
    description: "The STIX Extension Definition object allows producers of threat intelligence to extend existing STIX objects or to create entirely new STIX objects in a standardized way. "
    slots:
      - type
      - id
      - name
      - description
      - schema
      - version
      - extension_types
      - extension_properties
    slot_usage:
      type:
        pattern: "^extension-definition$"
      id:
        pattern: "^extension-definition--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      name:
        required: true
      schema:
        required: true
      version:
        required: true
      extension_types:
        required: true
        annotations:
          jsonschema_minItems: "1"
      extension_properties:
        annotations:
          jsonschema_minItems: "1"
          jsonschema_conditional_required: "required when extension_types contains toplevel-property-extension"
    annotations:
      jsonschema_rule: if-then
      validator_hint: extension-definition-top-level-property-constraint
      jsonschema_source: schemas/common/extension-definition.json

  Extension:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Converted from common/extension.json"
    slots:
      - extension_type
    slot_usage:
      extension_type:
        required: true
    annotations:
      jsonschema_minProperties: "1"
      jsonschema_source: schemas/common/extension.json

  ExternalReference:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "External references are used to describe pointers to information represented outside of STIX. "
    slots:
      - source_name
      - description
      - url
      - hashes
      - external_id
    slot_usage:
      source_name:
        required: true
      url:
        pattern: "^\\w+:"
    notes:
      - Upstream JSON Schema uses oneOf branches keyed by source_name; exact branch logic is delegated to validator tooling.
    annotations:
      jsonschema_rule: oneOf
      validator_hint: external-reference-branch-validation
      jsonschema_source: schemas/common/external-reference.json

  GranularMarking:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "The granular-marking type defines how the list of marking-definition objects referenced by the marking_refs property to apply to a set of content identified by the list of selectors in the selectors property. "
    slots:
      - marking_ref
      - selectors
      - lang
    slot_usage:
      marking_ref:
        required: true
        pattern: "^marking-definition--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      selectors:
        required: true
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/common/granular-marking.json

  HashesType:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "The Hashes type represents one or more cryptographic hashes, as a special set of key/value pairs "
    notes:
      - JSON Schema defines strict hash key patternProperties with algorithm-specific regex value constraints.
    annotations:
      jsonschema_rule: patternProperties+additionalProperties=false
      validator_hint: validate-hash-key-specific-patterns
      jsonschema_source: schemas/common/hashes-type.json

  Hex:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "The hex data type encodes an array of octets (8-bit bytes) as hexadecimal. The string MUST consist of an even number of hexadecimal characters, which are the digits '0' through '9' and the letters 'a' through 'f'. In order to allow pattern matching on custom objects, all properties that use the hex type, the property name MUST end with '_hex'. "
    annotations:
      jsonschema_type: string
      jsonschema_pattern: "^([a-fA-F0-9]{2})+$"
      jsonschema_source: schemas/common/hex.json

  Identifier:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Represents identifiers across the CTI specifications. The format consists of the name of the top-level object being identified, followed by two dashes (--), followed by a UUIDv4. "
    annotations:
      backed_by_type: stix_identifier
      jsonschema_source: schemas/common/identifier.json

  KillChainPhase:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "The kill-chain-phase represents a phase in a kill chain. "
    slots:
      - kill_chain_name
      - phase_name
    annotations:
      jsonschema_source: schemas/common/kill-chain-phase.json

  LanguageContent:
    is_a: Core
    in_subset:
      - common
    description: "The language-content object represents text content for STIX Objects represented in languages other than that of the original object. "
    slots:
      - type
      - id
      - object_ref
      - object_modified
      - contents
    slot_usage:
      type:
        pattern: "^language-content$"
      id:
        pattern: "^language-content--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      object_ref:
        required: true
      contents:
        required: true
    notes:
      - object_ref cannot target bundle or language-content IDs.
    annotations:
      jsonschema_rule: not
      validator_hint: language-content-object-ref-restrictions
      jsonschema_source: schemas/common/language-content.json

  MarkingDefinition:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "The marking-definition object represents a specific marking. "
    slots:
      - type
      - spec_version
      - id
      - name
      - created_by_ref
      - created
      - external_references
      - object_marking_refs
      - granular_markings
      - extensions
      - definition_type
      - definition
      - statement
    slot_usage:
      type:
        required: true
        pattern: "^marking-definition$"
      spec_version:
        required: true
      id:
        required: true
        pattern: "^marking-definition--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      created:
        required: true
      object_marking_refs:
        pattern: "^marking-definition--"
        annotations:
          jsonschema_minItems: "1"
      external_references:
        annotations:
          jsonschema_minItems: "1"
      granular_markings:
        annotations:
          jsonschema_minItems: "1"
      definition_type:
        annotations:
          jsonschema_conditional_required: "required unless extensions present"
      definition:
        annotations:
          jsonschema_conditional_required: "required unless extensions present"
    notes:
      - TLP and statement variants use oneOf/if-then logic in JSON Schema and are represented with validator hints.
    annotations:
      jsonschema_rule: oneOf+if-then
      validator_hint: enforce-marking-definition-branches
      jsonschema_source: schemas/common/marking-definition.json

  Properties:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Rules for custom properties "
    annotations:
      jsonschema_rule: patternProperties+additionalProperties=false
      validator_hint: validate-custom-properties
      jsonschema_source: schemas/common/properties.json

  Timestamp:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Represents timestamps across the CTI specifications. The format is an RFC3339 timestamp, with a required timezone specification of 'Z'. "
    annotations:
      jsonschema_type: string
      jsonschema_pattern: "^[0-9]{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])T([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9]|60)(\\.[0-9]+)?Z$"
      jsonschema_source: schemas/common/timestamp.json

  UrlRegex:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Matches a URI according to RFC 3986. "
    annotations:
      jsonschema_type: string
      jsonschema_format: uri
      jsonschema_source: schemas/common/url-regex.json

  Artifact:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Artifact Object permits capturing an array of bytes (8-bits), as a base64-encoded string string, or linking to a file-like payload. "
    slots:
      - mime_type
      - payload_bin
      - url
      - hashes
      - encryption_algorithm
      - decryption_key
    slot_usage:
      id:
        pattern: "^artifact--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^artifact$"
      mime_type:
        pattern: "^(application|audio|font|image|message|model|multipart|text|video)/[a-zA-Z0-9.+_-]+"
    notes:
      - JSON Schema enforces oneOf for payload_bin vs url+hashes and conditional decryption rules.
    annotations:
      jsonschema_rule: oneOf
      validator_hint: enforce-artifact-exclusive-payload-and-encryption-rules
      jsonschema_source: schemas/observables/artifact.json

  AutonomousSystem:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The AS object represents the properties of an Autonomous Systems (AS). "
    slots:
      - number
      - name
      - rir
    slot_usage:
      id:
        pattern: "^autonomous-system--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^autonomous-system$"
      number:
        required: true
    annotations:
      jsonschema_source: schemas/observables/autonomous-system.json

  Directory:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Directory Object represents the properties common to a file system directory. "
    slots:
      - path
      - path_enc
      - ctime
      - mtime
      - atime
      - contains_refs
    slot_usage:
      id:
        pattern: "^directory--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^directory$"
      path:
        required: true
      contains_refs:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/observables/directory.json

  DomainName:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Domain Name represents the properties of a network domain name. "
    slots:
      - value
      - resolves_to_refs
    slot_usage:
      id:
        pattern: "^domain-name--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^domain-name$"
      value:
        required: true
      resolves_to_refs:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/observables/domain-name.json

  EmailAddr:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Email Address Object represents a single email address. "
    slots:
      - value
      - display_name
      - belongs_to_ref
    slot_usage:
      id:
        pattern: "^email-addr--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^email-addr$"
      value:
        required: true
        pattern: "^[^@]+@[^@]+$"
    annotations:
      jsonschema_source: schemas/observables/email-addr.json

  EmailMessage:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Email Message Object represents an instance of an email message. "
    slots:
      - email_date
      - content_type
      - from_ref
      - sender_ref
      - to_refs
      - cc_refs
      - bcc_refs
      - message_id
      - subject
      - received_lines
      - additional_header_fields
      - raw_email_ref
      - is_multipart
      - body
      - body_multipart
    slot_usage:
      id:
        pattern: "^email-message--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^email-message$"
      to_refs:
        annotations:
          jsonschema_minItems: "1"
      cc_refs:
        annotations:
          jsonschema_minItems: "1"
      bcc_refs:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - JSON Schema includes oneOf multipart semantics between body and body_multipart.
    annotations:
      jsonschema_rule: oneOf
      validator_hint: enforce-email-message-multipart-constraints
      jsonschema_source: schemas/observables/email-message.json

  File:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The File Object represents the properties of a file. "
    slots:
      - type
      - id
      - hashes
      - size
      - name
      - name_enc
      - magic_number_hex
      - mime_type
      - ctime
      - mtime
      - atime
      - parent_directory_ref
      - contains_refs
      - content_ref
      - extensions
    slot_usage:
      id:
        pattern: "^file--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^file$"
      contains_refs:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - JSON Schema requires at least one of hashes or name.
    annotations:
      jsonschema_rule: anyOf
      exactly_one_of_hint: "hashes|name-at-least-one"
      jsonschema_source: schemas/observables/file.json

  Ipv4Addr:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The IPv4 Address Object represents one or more IPv4 addresses expressed using CIDR notation. "
    slots:
      - value
      - resolves_to_refs
      - belongs_to_refs
    slot_usage:
      id:
        pattern: "^ipv4-addr--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^ipv4-addr$"
      value:
        required: true
        pattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/(3[0-2]|[1-2][0-9]|[0-9]))?$"
      resolves_to_refs:
        annotations:
          jsonschema_minItems: "1"
      belongs_to_refs:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/observables/ipv4-addr.json

  Ipv6Addr:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The IPv6 Address Object represents one or more IPv6 addresses expressed using CIDR notation. "
    slots:
      - value
      - resolves_to_refs
      - belongs_to_refs
    slot_usage:
      id:
        pattern: "^ipv6-addr--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^ipv6-addr$"
      value:
        required: true
      resolves_to_refs:
        annotations:
          jsonschema_minItems: "1"
      belongs_to_refs:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/observables/ipv6-addr.json

  MacAddr:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The MAC Address Object represents a single Media Access Control (MAC) address. "
    slots:
      - value
    slot_usage:
      id:
        pattern: "^mac-addr--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^mac-addr$"
      value:
        required: true
        pattern: "^([0-9a-f]{2}[:]){5}([0-9a-f]{2})$"
    annotations:
      jsonschema_source: schemas/observables/mac-addr.json

  Mutex:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Mutex Object represents the properties of a mutual exclusion (mutex) object. "
    slot_usage:
      id:
        pattern: "^mutex--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^mutex$"
      name:
        required: true
    annotations:
      jsonschema_source: schemas/observables/mutex.json

  NetworkTraffic:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Network Traffic Object represents arbitrary network traffic that originates from a source and is addressed to a destination. "
    slots:
      - start
      - end
      - src_ref
      - dst_ref
      - src_port
      - dst_port
      - protocols
      - src_byte_count
      - dst_byte_count
      - src_packets
      - dst_packets
      - ipfix
      - src_payload_ref
      - dst_payload_ref
      - encapsulates_refs
      - encapsulated_by_ref
      - is_active
    slot_usage:
      id:
        pattern: "^network-traffic--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^network-traffic$"
      protocols:
        required: true
        annotations:
          jsonschema_minItems: "1"
      encapsulates_refs:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - JSON Schema requires at least one of src_ref or dst_ref and constrains is_active/end combinations.
    annotations:
      jsonschema_rule: anyOf+oneOf
      validator_hint: enforce-network-traffic-endpoint-and-active-rules
      jsonschema_source: schemas/observables/network-traffic.json

  Process:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Process Object represents common properties of an instance of a computer program as executed on an operating system. "
    slots:
      - is_hidden
      - pid
      - created_time
      - cwd
      - command_line
      - environment_variables
      - opened_connection_refs
      - creator_user_ref
      - image_ref
      - parent_ref
      - child_refs
    slot_usage:
      id:
        pattern: "^process--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^process$"
      opened_connection_refs:
        annotations:
          jsonschema_minItems: "1"
      child_refs:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - JSON Schema uses anyOf presence constraints across many optional process fields.
    annotations:
      jsonschema_rule: anyOf
      validator_hint: process-any-of-field-presence
      jsonschema_source: schemas/observables/process.json

  Software:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Software Object represents high-level properties associated with software, including software products. "
    slots:
      - cpe
      - swid
      - languages
      - vendor
      - version
    slot_usage:
      id:
        pattern: "^software--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^software$"
      name:
        required: true
      languages:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/observables/software.json

  Url:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The URL Object represents the properties of a uniform resource locator (URL). "
    slots:
      - value
    slot_usage:
      id:
        pattern: "^url--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^url$"
      value:
        required: true
    annotations:
      jsonschema_source: schemas/observables/url.json

  UserAccount:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The User Account Object represents an instance of any type of user account, including but not limited to operating system, device, messaging service, and social media platform accounts. "
    slots:
      - user_id
      - credential
      - account_login
      - account_type
      - display_name
      - is_service_account
      - is_privileged
      - can_escalate_privs
      - is_disabled
      - account_created
      - account_expires
      - credential_last_changed
      - account_first_login
      - account_last_login
    slot_usage:
      id:
        pattern: "^user-account--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^user-account$"
    notes:
      - JSON Schema defines anyOf presence constraints requiring at least one key identity/account property.
    annotations:
      jsonschema_rule: anyOf
      validator_hint: user-account-at-least-one-property
      jsonschema_source: schemas/observables/user-account.json

  WindowsRegistryValue:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Structured value entry under a Windows registry key."
    slots:
      - registry_value_name
      - registry_value_data
      - registry_value_data_type
    notes:
      - Source JSON schema uses anyOf to require at least one of name, data, or data_type.
    annotations:
      jsonschema_rule: anyOf
      validator_hint: windows-registry-value-at-least-one-field
      jsonschema_source: schemas/observables/windows-registry-key.json#/definitions/windows-registry-value-type

  MimePartType:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Specifies a component of a multi-part email body as defined in the email-message observable."
    slots:
      - body
      - body_raw_ref
      - content_type
      - content_disposition
    notes:
      - JSON Schema requires exactly one of body (for text/* content) or body_raw_ref (for non-text content).
    annotations:
      jsonschema_rule: oneOf
      validator_hint: enforce-mime-part-body-or-body-raw-ref-exclusive
      jsonschema_source: schemas/observables/email-message.json#/definitions/mime-part-type

  # ── Observable Extension Sub-Classes ──────────────────────────────────────
  # These represent the structured extension payloads keyed by extension name
  # in the parent object's extensions dictionary (patternProperties in JSON Schema).

  WindowsProcessExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Windows Process extension specifies properties specific to Windows processes. Used as the value of the 'windows-process-ext' key in a Process object's extensions dictionary."
    slots:
      - aslr_enabled
      - dep_enabled
      - priority
      - owner_sid
      - window_title
      - startup_info
      - integrity_level
    annotations:
      stix_extension_key: windows-process-ext
      stix_parent_type: process
      jsonschema_source: schemas/observables/process.json

  WindowsServiceExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Windows Service extension specifies properties specific to Windows services. Used as the value of the 'windows-service-ext' key in a Process object's extensions dictionary."
    slots:
      - service_name
      - descriptions
      - display_name
      - group_name
      - start_type
      - service_dll_refs
      - service_type
      - service_status
    slot_usage:
      service_dll_refs:
        annotations:
          jsonschema_minItems: "1"
      descriptions:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      stix_extension_key: windows-service-ext
      stix_parent_type: process
      jsonschema_source: schemas/observables/process.json

  HttpRequestExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The HTTP Request extension specifies a default extension for capturing network traffic properties specific to HTTP requests. Used as the value of the 'http-request-ext' key in a NetworkTraffic object's extensions dictionary."
    slots:
      - request_method
      - request_value
      - request_version
      - request_header
      - message_body_length
      - message_body_data_ref
    slot_usage:
      request_method:
        required: true
      request_value:
        required: true
    annotations:
      stix_extension_key: http-request-ext
      stix_parent_type: network-traffic
      jsonschema_source: schemas/observables/network-traffic.json

  IcmpExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The ICMP extension specifies a default extension for capturing network traffic properties specific to ICMP. Used as the value of the 'icmp-ext' key in a NetworkTraffic object's extensions dictionary."
    slots:
      - icmp_type_hex
      - icmp_code_hex
    slot_usage:
      icmp_type_hex:
        required: true
      icmp_code_hex:
        required: true
    annotations:
      stix_extension_key: icmp-ext
      stix_parent_type: network-traffic
      jsonschema_source: schemas/observables/network-traffic.json

  SocketExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Socket extension specifies a default extension for capturing network traffic properties specific to network sockets. Used as the value of the 'socket-ext' key in a NetworkTraffic object's extensions dictionary."
    slots:
      - address_family
      - is_blocking
      - is_listening
      - socket_options
      - socket_type
      - socket_descriptor
      - socket_handle
    slot_usage:
      address_family:
        required: true
    annotations:
      stix_extension_key: socket-ext
      stix_parent_type: network-traffic
      jsonschema_source: schemas/observables/network-traffic.json

  TcpExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The TCP extension specifies a default extension for capturing network traffic properties specific to TCP. Used as the value of the 'tcp-ext' key in a NetworkTraffic object's extensions dictionary."
    slots:
      - src_flags_hex
      - dst_flags_hex
    annotations:
      stix_extension_key: tcp-ext
      stix_parent_type: network-traffic
      jsonschema_source: schemas/observables/network-traffic.json

  UnixAccountExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Unix Account extension specifies a default extension for capturing the additional information for an account on a Unix system. Used as the value of the 'unix-account-ext' key in a UserAccount object's extensions dictionary."
    slots:
      - gid
      - groups
      - home_dir
      - shell
    slot_usage:
      groups:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      stix_extension_key: unix-account-ext
      stix_parent_type: user-account
      jsonschema_source: schemas/observables/user-account.json

  X509V3ExtensionsType:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Specifies any standard X.509 v3 extensions that may be used in the certificate."
    slots:
      - basic_constraints
      - name_constraints
      - policy_constraints
      - key_usage
      - extended_key_usage
      - subject_key_identifier
      - authority_key_identifier
      - subject_alternative_name
      - issuer_alternative_name
      - subject_directory_attributes
      - crl_distribution_points
      - inhibit_any_policy
      - private_key_usage_period_not_before
      - private_key_usage_period_not_after
      - certificate_policies
      - policy_mappings
    annotations:
      jsonschema_source: schemas/observables/x509-certificate.json#/definitions/x509-v3-extensions-type

  AlternateDataStreamType:
    is_a: CommonSchemaComponent
    in_subset:
      - common
    description: "Specifies properties of an NTFS alternate data stream."
    slots:
      - ads_name
      - ads_size
      - ads_hashes
    slot_usage:
      ads_name:
        required: true
    annotations:
      jsonschema_source: schemas/observables/file.json#/definitions/ntfs-ext/properties/alternate_data_streams/items

  NtfsExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The NTFS extension specifies a default extension for capturing properties specific to the storage of the file on the NTFS file system."
    slots:
      - sid
      - alternate_data_streams
    annotations:
      stix_extension_key: ntfs-ext
      stix_parent_type: file
      jsonschema_source: schemas/observables/file.json

  RasterImageExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Raster Image extension specifies a default extension for capturing properties specific to raster image files."
    slots:
      - image_height
      - image_width
      - bits_per_pixel
      - exif_tags
    annotations:
      stix_extension_key: raster-image-ext
      stix_parent_type: file
      jsonschema_source: schemas/observables/file.json

  PdfExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The PDF extension specifies a default extension for capturing properties specific to PDF files."
    slots:
      - version
      - is_optimized
      - document_info_dict
      - pdfid0
      - pdfid1
    annotations:
      stix_extension_key: pdf-ext
      stix_parent_type: file
      jsonschema_source: schemas/observables/file.json

  ArchiveExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Archive File extension specifies a default extension for capturing properties specific to archive files, such as ZIP."
    slots:
      - contains_refs
      - comment
    slot_usage:
      contains_refs:
        required: true
        annotations:
          jsonschema_minItems: "1"
    annotations:
      stix_extension_key: archive-ext
      stix_parent_type: file
      jsonschema_source: schemas/observables/file.json

  WindowsPESection:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Windows PE Section type specifies metadata about a PE file section."
    slots:
      - pe_section_name
      - pe_section_size
      - entropy
      - pe_section_hashes
    slot_usage:
      pe_section_name:
        required: true
    annotations:
      jsonschema_source: schemas/observables/file.json#/definitions/windows-pe-section

  WindowsPEOptionalHeaderType:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Windows PE Optional Header type represents the properties of the PE optional header. At least one property from this type MUST be included."
    slots:
      - magic_hex
      - major_linker_version
      - minor_linker_version
      - size_of_code
      - size_of_initialized_data
      - size_of_uninitialized_data
      - address_of_entry_point
      - base_of_code
      - base_of_data
      - image_base
      - section_alignment
      - file_alignment
      - major_os_version
      - minor_os_version
      - major_image_version
      - minor_image_version
      - major_subsystem_version
      - minor_subsystem_version
      - win32_version_value_hex
      - size_of_image
      - size_of_headers
      - checksum_hex
      - subsystem_hex
      - dll_characteristics_hex
      - size_of_stack_reserve
      - size_of_stack_commit
      - size_of_heap_reserve
      - size_of_heap_commit
      - loader_flags_hex
      - number_of_rva_and_sizes
    notes:
      - JSON Schema requires at least one property (minProperties=1).
    annotations:
      jsonschema_rule: minProperties=1
      jsonschema_source: schemas/observables/file.json#/definitions/windows-pe-optional-header-type

  PEBinaryExt:
    is_a: CommonSchemaComponent
    in_subset:
      - observables
    description: "The Windows PE Binary File extension specifies a default extension for capturing properties specific to Windows portable executable (PE) files."
    slots:
      - pe_type
      - imphash
      - machine_hex
      - number_of_sections
      - time_date_stamp
      - pointer_to_symbol_table_hex
      - number_of_symbols
      - size_of_optional_header
      - characteristics_hex
      - file_header_hashes
      - optional_header
      - sections
    slot_usage:
      pe_type:
        required: true
      sections:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      stix_extension_key: windows-pebinary-ext
      stix_parent_type: file
      jsonschema_source: schemas/observables/file.json
  
  WindowsRegistryKey:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The Registry Key Object represents the properties of a Windows registry key. "
    slots:
      - key
      - values
      - modified_time
      - creator_user_ref
      - number_of_subkeys
    slot_usage:
      id:
        pattern: "^windows-registry-key--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^windows-registry-key$"
      key:
        pattern: "^(?!HKLM|HKCC|HKCR|HKCU|HKU|hklm|hkcc|hkcr|hkcu|hku).*$"
    notes:
      - JSON Schema uses anyOf for key/value/modified/creator/subkey presence requirements.
    annotations:
      jsonschema_rule: anyOf
      validator_hint: registry-key-presence-requirements
      jsonschema_source: schemas/observables/windows-registry-key.json

  X509Certificate:
    is_a: CyberObservableObject
    in_subset:
      - observables
    description: "The X509 Certificate Object represents the properties of an X.509 certificate. "
    slots:
      - is_self_signed
      - hashes
      - version
      - serial_number
      - signature_algorithm
      - issuer
      - validity_not_before
      - validity_not_after
      - subject
      - subject_public_key_algorithm
      - subject_public_key_modulus
      - subject_public_key_exponent
      - x509_v3_extensions
    slot_usage:
      id:
        pattern: "^x509-certificate--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^x509-certificate$"
    notes:
      - JSON Schema defines anyOf requiring at least one certificate detail field.
    annotations:
      jsonschema_rule: anyOf
      validator_hint: x509-at-least-one-detail-field
      jsonschema_source: schemas/observables/x509-certificate.json

  AttackPattern:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Attack Patterns are a type of TTP that describe ways that adversaries attempt to compromise targets. "
    slots:
      - aliases
      - kill_chain_phases
    slot_usage:
      id:
        pattern: "^attack-pattern--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^attack-pattern$"
      name:
        required: true
      kill_chain_phases:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/attack-pattern.json

  Campaign:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "A Campaign is a grouping of adversary behavior that describes a set of malicious activities or attacks that occur over a period of time against a specific set of targets. "
    slots:
      - aliases
      - first_seen
      - last_seen
      - objective
    slot_usage:
      id:
        pattern: "^campaign--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^campaign$"
      name:
        required: true
      aliases:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/campaign.json

  CourseOfAction:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "A Course of Action is an action taken either to prevent an attack or to respond to an attack that is in progress. "
    slot_usage:
      id:
        pattern: "^course-of-action--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^course-of-action$"
      name:
        required: true
    annotations:
      jsonschema_source: schemas/sdos/course-of-action.json

  Grouping:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "A Grouping object explicitly asserts that the referenced STIX Objects have a shared content. "
    slots:
      - context
      - object_refs
    slot_usage:
      id:
        pattern: "^grouping--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^grouping$"
      context:
        required: true
      object_refs:
        required: true
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/grouping.json

  Identity:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Identities can represent actual individuals, organizations, or groups (e.g., ACME, Inc.) as well as classes of individuals, organizations, or groups. "
    slots:
      - roles
      - identity_class
      - sectors
      - contact_information
    slot_usage:
      id:
        pattern: "^identity--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^identity$"
      name:
        required: true
      roles:
        annotations:
          jsonschema_minItems: "1"
      sectors:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/identity.json

  Incident:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "The Incident object in STIX 2.1 is a stub, to be expanded in future STIX 2 releases. "
    slot_usage:
      id:
        pattern: "^incident--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^incident$"
      name:
        required: true
    annotations:
      jsonschema_source: schemas/sdos/incident.json

  Indicator:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Indicators contain a pattern that can be used to detect suspicious or malicious cyber activity. "
    slots:
      - indicator_types
      - pattern
      - pattern_type
      - pattern_version
      - valid_from
      - valid_until
      - kill_chain_phases
    slot_usage:
      id:
        pattern: "^indicator--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^indicator$"
      pattern:
        required: true
      pattern_type:
        required: true
      valid_from:
        required: true
      indicator_types:
        annotations:
          jsonschema_minItems: "1"
      kill_chain_phases:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - pattern syntax and parse validity are enforced by the STIX pattern ANTLR grammar.
    annotations:
      jsonschema_source: schemas/sdos/indicator.json
      source: https://github.com/oasis-open/cti-stix2-json-schemas/blob/master/pattern_grammar/STIXPattern.g4
      validator_hint: validate-indicator-pattern-with-antlr

  Infrastructure:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Infrastructure objects describe systems, software services, and associated physical or virtual resources. "
    slots:
      - infrastructure_types
      - aliases
      - kill_chain_phases
      - first_seen
      - last_seen
    slot_usage:
      id:
        pattern: "^infrastructure--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^infrastructure$"
      name:
        required: true
      infrastructure_types:
        annotations:
          jsonschema_minItems: "1"
      aliases:
        annotations:
          jsonschema_minItems: "1"
      kill_chain_phases:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/infrastructure.json

  IntrusionSet:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "An Intrusion Set is a grouped set of adversary behavior and resources with common properties that is believed to be orchestrated by a single organization. "
    slots:
      - aliases
      - first_seen
      - last_seen
      - goals
      - resource_level
      - primary_motivation
      - secondary_motivations
    slot_usage:
      id:
        pattern: "^intrusion-set--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^intrusion-set$"
      name:
        required: true
      aliases:
        annotations:
          jsonschema_minItems: "1"
      goals:
        annotations:
          jsonschema_minItems: "1"
      secondary_motivations:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/intrusion-set.json

  Location:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "A Location represents a geographic location. The location may be described as any, some or all of the following: region (e.g., North America), civic address (e.g. New York, US), latitude and longitude. "
    slots:
      - latitude
      - longitude
      - precision
      - region
      - country
      - administrative_area
      - city
      - street_address
      - postal_code
    slot_usage:
      id:
        pattern: "^location--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^location$"
    notes:
      - JSON Schema requires one of region, country, or latitude+longitude and constrains precision usage.
    annotations:
      jsonschema_rule: anyOf+oneOf
      validator_hint: enforce-location-coordinate-and-region-rules
      jsonschema_source: schemas/sdos/location.json

  MalwareAnalysis:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Malware Analysis captures the metadata and results of a particular analysis performed (static or dynamic) on the malware instance or family. "
    slots:
      - product
      - version
      - configuration_version
      - modules
      - analysis_engine_version
      - analysis_definition_version
      - submitted
      - analysis_started
      - analysis_ended
      - result_name
      - result
      - host_vm_ref
      - operating_system_ref
      - installed_software_refs
      - analysis_sco_refs
      - sample_ref
    slot_usage:
      id:
        pattern: "^malware-analysis--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^malware-analysis$"
      product:
        required: true
      modules:
        annotations:
          jsonschema_minItems: "1"
      installed_software_refs:
        pattern: "^software--"
        annotations:
          jsonschema_minItems: "1"
      analysis_sco_refs:
        annotations:
          jsonschema_minItems: "1"
      host_vm_ref:
        pattern: "^software--"
      operating_system_ref:
        pattern: "^software--"
      sample_ref:
        pattern: "^(artifact--|file--|network-traffic--)"
    notes:
      - JSON Schema requires either result or analysis_sco_refs.
    annotations:
      jsonschema_rule: anyOf
      validator_hint: malware-analysis-result-or-analysis-sco-refs
      jsonschema_source: schemas/sdos/malware-analysis.json

  Malware:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Malware is a type of TTP that is also known as malicious code and malicious software, refers to a program that is inserted into a system, usually covertly, with the intent of compromising the confidentiality, integrity, or availability of the victim's data, applications, or operating system (OS) or of otherwise annoying or disrupting the victim. "
    slots:
      - aliases
      - first_seen
      - last_seen
      - operating_system_refs
      - architecture_execution_envs
      - implementation_languages
      - capabilities
      - sample_refs
      - malware_types
      - is_family
      - kill_chain_phases
    slot_usage:
      id:
        pattern: "^malware--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^malware$"
      is_family:
        required: true
      malware_types:
        annotations:
          jsonschema_minItems: "1"
      operating_system_refs:
        pattern: "^software--"
        annotations:
          jsonschema_minItems: "1"
      architecture_execution_envs:
        annotations:
          jsonschema_minItems: "1"
      implementation_languages:
        annotations:
          jsonschema_minItems: "1"
      capabilities:
        annotations:
          jsonschema_minItems: "1"
      sample_refs:
        annotations:
          jsonschema_minItems: "1"
      aliases:
        annotations:
          jsonschema_minItems: "1"
      kill_chain_phases:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - JSON Schema includes oneOf semantics where name is required when is_family=true.
    annotations:
      jsonschema_rule: oneOf
      validator_hint: enforce-malware-family-name-constraint
      jsonschema_source: schemas/sdos/malware.json

  Note:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "A Note is a comment or note containing informative text to help explain the context of one or more STIX Objects (SDOs or SROs) or to provide additional analysis that is not contained in the original object. "
    slots:
      - abstract
      - content
      - authors
      - object_refs
    slot_usage:
      id:
        pattern: "^note--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^note$"
      content:
        required: true
      object_refs:
        required: true
        annotations:
          jsonschema_minItems: "1"
      authors:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/note.json

  ObservedData:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Observed data conveys information that was observed on systems and networks, such as log data or network traffic, using the Cyber Observable specification. "
    slots:
      - first_observed
      - last_observed
      - number_observed
      - objects
      - object_refs
    slot_usage:
      id:
        pattern: "^observed-data--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^observed-data$"
      first_observed:
        required: true
      last_observed:
        required: true
      number_observed:
        required: true
      object_refs:
        annotations:
          jsonschema_minItems: "1"
    notes:
      - JSON Schema requires one of objects or object_refs.
    annotations:
      jsonschema_rule: oneOf
      validator_hint: observed-data-objects-or-object-refs
      jsonschema_source: schemas/sdos/observed-data.json

  Opinion:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "An Opinion is an assessment of the correctness of the information in a STIX Object produced by a different entity and captures the level of agreement or disagreement using a fixed scale. "
    slots:
      - explanation
      - authors
      - object_refs
      - opinion
    slot_usage:
      id:
        pattern: "^opinion--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^opinion$"
      object_refs:
        required: true
        annotations:
          jsonschema_minItems: "1"
      opinion:
        required: true
      authors:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/opinion.json

  Report:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Reports are collections of threat intelligence focused on one or more topics, such as a description of a threat actor, malware, or attack technique, including context and related details. "
    slots:
      - report_types
      - published
      - object_refs
    slot_usage:
      id:
        pattern: "^report--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^report$"
      name:
        required: true
      published:
        required: true
      object_refs:
        required: true
        annotations:
          jsonschema_minItems: "1"
      report_types:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/report.json

  ThreatActor:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Threat Actors are actual individuals, groups, or organizations believed to be operating with malicious intent. "
    slots:
      - threat_actor_types
      - aliases
      - roles
      - goals
      - first_seen
      - last_seen
      - sophistication
      - resource_level
      - primary_motivation
      - secondary_motivations
      - personal_motivations
    slot_usage:
      id:
        pattern: "^threat-actor--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^threat-actor$"
      name:
        required: true
      threat_actor_types:
        annotations:
          jsonschema_minItems: "1"
      aliases:
        annotations:
          jsonschema_minItems: "1"
      roles:
        annotations:
          jsonschema_minItems: "1"
      goals:
        annotations:
          jsonschema_minItems: "1"
      secondary_motivations:
        annotations:
          jsonschema_minItems: "1"
      personal_motivations:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/threat-actor.json

  Tool:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "Tools are legitimate software that can be used by threat actors to perform attacks. "
    slots:
      - aliases
      - tool_types
      - tool_version
      - kill_chain_phases
    slot_usage:
      id:
        pattern: "^tool--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^tool$"
      name:
        required: true
      aliases:
        annotations:
          jsonschema_minItems: "1"
      tool_types:
        annotations:
          jsonschema_minItems: "1"
      kill_chain_phases:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sdos/tool.json

  Vulnerability:
    is_a: StixDomainObject
    in_subset:
      - sdos
    description: "A Vulnerability is a mistake in software that can be directly used by a hacker to gain access to a system or network. "
    slot_usage:
      id:
        pattern: "^vulnerability--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^vulnerability$"
      name:
        required: true
    annotations:
      jsonschema_source: schemas/sdos/vulnerability.json

  Relationship:
    is_a: StixRelationshipObject
    in_subset:
      - sros
    description: "The Relationship object is used to link together two SDOs in order to describe how they are related to each other. "
    slots:
      - relationship_type
      - source_ref
      - target_ref
      - start_time
      - stop_time
    slot_usage:
      id:
        pattern: "^relationship--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^relationship$"
      relationship_type:
        required: true
      source_ref:
        required: true
      target_ref:
        required: true
    notes:
      - source_ref and target_ref cannot target relationship, sighting, bundle, marking-definition, or language-content IDs.
    annotations:
      jsonschema_rule: not
      validator_hint: relationship-ref-prefix-exclusion
      jsonschema_source: schemas/sros/relationship.json

  Sighting:
    is_a: StixRelationshipObject
    in_subset:
      - sros
    description: "A Sighting denotes the belief that something in CTI (e.g., an indicator, malware, tool, threat actor, etc.) was seen. "
    slots:
      - sighting_of_ref
      - observed_data_refs
      - where_sighted_refs
      - first_seen
      - last_seen
      - count
      - summary
    slot_usage:
      id:
        pattern: "^sighting--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
      type:
        pattern: "^sighting$"
      sighting_of_ref:
        required: true
      where_sighted_refs:
        annotations:
          jsonschema_minItems: "1"
    annotations:
      jsonschema_source: schemas/sros/sighting.json
