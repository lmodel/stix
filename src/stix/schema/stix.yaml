slots:
  id:
    description: STIX object identifier.
    range: stix_identifier
  type:
    description: STIX object type.
    range: stix_type_name
  spec_version:
    description: STIX specification version.
    range: SpecVersionEnum
  name:
    description: Human-readable name.
    range: string
  description:
    description: Human-readable description.
    range: string
  created:
    description: Creation timestamp.
    range: datetime
  modified:
    description: Modification timestamp.
    range: datetime
  created_by_ref:
    description: ID of the object that created this object.
    range: stix_identifier
  labels:
    description: Terms used to describe this object.
    range: string
    multivalued: true
  revoked:
    description: Indicates whether this object has been revoked.
    range: boolean
  confidence:
    description: Confidence that the producer has in this data.
    range: integer
    minimum_value: 0
    maximum_value: 100
  lang:
    description: Language of textual properties.
    range: string
  external_references:
    description: External references to non-STIX information.
    range: ExternalReference
    multivalued: true
  object_marking_refs:
    description: Marking definition references applied to this object.
    range: stix_identifier
    multivalued: true
  granular_markings:
    description: Granular markings that apply to selected content.
    range: GranularMarking
    multivalued: true
  extensions:
    description: Open-ended extension payloads.
    range: string
    multivalued: true
    notes:
      - JSON Schema uses patternProperties for extension keys; exact key validation is delegated to validator tooling.
    annotations:
      jsonschema_rule: patternProperties
      validator_hint: validate-extension-keys-and-values
  defanged:
    description: Defines whether or not the data contained within the object has been defanged.
    range: boolean
  source_name:
    description: Name of the external source.
    range: string
  url:
    description: A URL reference to an external resource.
    range: uriorcurie
  hashes:
    description: Specifies a dictionary of hashes for the file or content.
    range: HashesType
  external_id:
    description: An identifier for the external reference content.
    range: string
  marking_ref:
    description: Marking-definition reference.
    range: stix_identifier
  selectors:
    description: A list of selectors for content contained within the STIX object in which this property appears.
    range: string
    multivalued: true
  kill_chain_name:
    description: Name of the kill chain.
    range: string
    required: true
  phase_name:
    description: Name of the kill chain phase.
    range: string
    required: true
  relationship_type:
    description: Name of the relationship type.
    range: string
    pattern: "^[a-z0-9\\-]+$"
  source_ref:
    description: Relationship source object reference.
    range: stix_identifier
    annotations:
      validator_hint: reject-disallowed-source-prefixes
  target_ref:
    description: Relationship target object reference.
    range: stix_identifier
    annotations:
      validator_hint: reject-disallowed-target-prefixes
  start_time:
    description: Start timestamp for temporal relationship validity.
    range: datetime
  stop_time:
    description: End timestamp for temporal relationship validity.
    range: datetime
  sighting_of_ref:
    description: Reference to the object being sighted.
    range: stix_identifier
  observed_data_refs:
    description: References to observed-data objects.
    range: stix_identifier
    multivalued: true
  where_sighted_refs:
    description: References to identities or locations where sighted.
    range: stix_identifier
    multivalued: true
  count:
    description: This is an integer between 0 and 999,999,999 inclusive and represents the number of times the object was sighted.
    range: integer
    minimum_value: 0
  pattern:
    description: The detection pattern for this indicator.
    range: string
    annotations:
      source: https://github.com/oasis-open/cti-stix2-json-schemas/blob/master/pattern_grammar/STIXPattern.g4
      validator_hint: parse-with-stix-pattern-antlr-grammar
  pattern_type:
    description: The type of pattern used in this indicator.
    any_of:
      - range: PatternTypeOv
      - range: string
    pattern: "^[a-z0-9\\-]+$"
    annotations:
      open_vocabulary: PatternTypeOv
  pattern_version:
    description: The version of the pattern that is used.
    range: string
  valid_from:
    description: The time from which this indicator should be considered valuable intelligence.
    range: datetime
  valid_until:
    description: The time at which this indicator should no longer be considered valuable intelligence.
    range: datetime
  indicator_types:
    description: This field is an Open Vocabulary that specifies the type of indicator. Open vocab - indicator-type-ov
    multivalued: true
    any_of:
      - range: IndicatorTypeOv
      - range: string
    annotations:
      open_vocabulary: IndicatorTypeOv
  kill_chain_phases:
    description: Kill chain phases associated with this object.
    range: KillChainPhase
    multivalued: true
  first_seen:
    description: First time observed.
    range: datetime
  last_seen:
    description: Last time observed.
    range: datetime
  definition_type:
    description: Type discriminator for marking definition content.
    range: string
  definition:
    description: Marking definition payload.
    range: string
  value:
    description: Canonical string value for simple cyber observables.
    range: string
  resolves_to_refs:
    description: References this observable resolves to.
    range: stix_identifier
    multivalued: true
  belongs_to_refs:
    description: References this observable belongs to.
    range: stix_identifier
    multivalued: true
  display_name:
    description: Human-friendly display name.
    range: string
  belongs_to_ref:
    description: Single reference this observable belongs to.
    range: stix_identifier
  aliases:
    description: Alternative names for the object.
    range: string
    multivalued: true
  report_types:
    description: Open-vocabulary report categories.
    multivalued: true
    any_of:
      - range: ReportTypeOv
      - range: string
    annotations:
      open_vocabulary: ReportTypeOv
  published:
    description: Timestamp when a report was published.
    range: datetime
  object_refs:
    description: Referenced STIX objects.
    range: stix_identifier
    multivalued: true
  threat_actor_types:
    description: Open-vocabulary threat actor categories.
    multivalued: true
    any_of:
      - range: ThreatActorTypeOv
      - range: string
    annotations:
      open_vocabulary: ThreatActorTypeOv
  roles:
    description: Open-vocabulary threat actor roles.
    multivalued: true
    any_of:
      - range: ThreatActorRoleOv
      - range: string
    annotations:
      open_vocabulary: ThreatActorRoleOv
  goals:
    description: Threat actor goals.
    range: string
    multivalued: true
  sophistication:
    description: Threat actor sophistication level.
    any_of:
      - range: ThreatActorSophisticationOv
      - range: string
    annotations:
      open_vocabulary: ThreatActorSophisticationOv
  resource_level:
    description: Threat actor resource level (attack-resource-level-ov).
    any_of:
      - range: AttackResourceLevelOv
      - range: string
    annotations:
      open_vocabulary: AttackResourceLevelOv
  primary_motivation:
    description: Primary motivation (attack-motivation-ov).
    any_of:
      - range: AttackMotivationOv
      - range: string
    annotations:
      open_vocabulary: AttackMotivationOv
  secondary_motivations:
    description: Secondary motivations (attack-motivation-ov).
    multivalued: true
    any_of:
      - range: AttackMotivationOv
      - range: string
    annotations:
      open_vocabulary: AttackMotivationOv
  personal_motivations:
    description: Personal motivations of the threat actor (attack-motivation-ov).
    multivalued: true
    any_of:
      - range: AttackMotivationOv
      - range: string
    annotations:
      open_vocabulary: AttackMotivationOv
  is_family:
    description: Indicates if malware object is a family.
    range: boolean
  operating_system_refs:
    description: References to software operating systems.
    range: stix_identifier
    multivalued: true
  architecture_execution_envs:
    description: Open-vocabulary processor architectures (processor-architecture-ov).
    multivalued: true
    any_of:
      - range: ProcessorArchitectureOv
      - range: string
    annotations:
      open_vocabulary: ProcessorArchitectureOv
  implementation_languages:
    description: Open-vocabulary implementation languages (implementation-language-ov).
    multivalued: true
    any_of:
      - range: ImplementationLanguageOv
      - range: string
    annotations:
      open_vocabulary: ImplementationLanguageOv
  capabilities:
    description: Open-vocabulary malware capabilities (malware-capabilities-ov).
    multivalued: true
    any_of:
      - range: MalwareCapabilityOv
      - range: string
    annotations:
      open_vocabulary: MalwareCapabilityOv
  sample_refs:
    description: References to associated sample artifacts/files.
    range: stix_identifier
    multivalued: true
  malware_types:
    description: Open-vocabulary malware types (malware-type-ov).
    multivalued: true
    any_of:
      - range: MalwareTypeOv
      - range: string
    annotations:
      open_vocabulary: MalwareTypeOv
  infrastructure_types:
    description: Open-vocabulary infrastructure categories (infrastructure-type-ov).
    multivalued: true
    any_of:
      - range: InfrastructureTypeOv
      - range: string
    annotations:
      open_vocabulary: InfrastructureTypeOv
  tool_types:
    description: Open-vocabulary tool categories (tool-type-ov).
    multivalued: true
    any_of:
      - range: ToolTypeOv
      - range: string
    annotations:
      open_vocabulary: ToolTypeOv
  tool_version:
    description: Version identifier for a tool.
    range: string
  context:
    description: Grouping context classifier.
    range: string
  abstract:
    description: Brief summary text.
    range: string
  content:
    description: Main text content payload.
    range: string
  authors:
    description: Author list.
    range: string
    multivalued: true
  explanation:
    description: Explanation text for an opinion.
    range: string
  opinion:
    description: Opinion value.
    range: OpinionEnum
  first_observed:
    description: Start of observation window.
    range: datetime
  last_observed:
    description: End of observation window.
    range: datetime
  number_observed:
    description: Number of observations.
    range: integer
    minimum_value: 1
    maximum_value: 999999999
  objects:
    description: Embedded cyber observable dictionary payload.
    range: CyberObservableObject
    multivalued: true
    inlined: true
    notes:
      - JSON Schema models this as a pattern-keyed dictionary of SCO objects.
    annotations:
      jsonschema_rule: patternProperties+oneOf
      validator_hint: validate-observed-data-objects-dictionary
  size:
    description: Object size in bytes.
    range: integer
    minimum_value: 0
  name_enc:
    description: Encoding for a name field.
    range: string
    pattern: "^[a-zA-Z0-9/\\.+_:-]{2,250}$"
  magic_number_hex:
    description: Hex magic number.
    range: string
  parent_directory_ref:
    description: Parent directory reference.
    range: stix_identifier
  content_ref:
    description: Referenced content object.
    range: stix_identifier
  number:
    description: Numeric identifier value.
    range: integer
  rir:
    description: Regional Internet Registry name.
    range: string
  path:
    description: Filesystem path.
    range: string
  path_enc:
    description: Encoding used for a filesystem path.
    range: string
    pattern: "^[a-zA-Z0-9/\\.+_:-]{2,250}$"
  ctime:
    description: Creation time.
    range: datetime
  mtime:
    description: Last modification time.
    range: datetime
  atime:
    description: Last access time.
    range: datetime
  contains_refs:
    description: References to contained objects.
    range: stix_identifier
    multivalued: true
  mime_type:
    description: MIME type value.
    range: string
  payload_bin:
    description: Base64 binary payload.
    range: string
  encryption_algorithm:
    description: Artifact encryption algorithm.
    range: string
  decryption_key:
    description: Decryption key material.
    range: string
  email_date:
    description: Date/time the email message was sent.
