---
id: https://w3id.org/lmodel/stix
name: stix
title: STIX
description: |-
  Structured Threat Information Expression (STIX): LinkML Schema
  derived from OASIS CTI STIX 2.1 JSON Schemas.
license: Apache-2.0
see_also:
  - https://lmodel.github.io/stix
  - https://github.com/oasis-open/cti-stix2-json-schemas

prefixes:
  stix: https://w3id.org/lmodel/stix/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
default_prefix: stix
default_range: string

source: https://github.com/oasis-open/cti-stix2-json-schemas/tree/master/schemas

imports:
  - linkml:types

annotations:
  constraint_strategy: linkml-plus-validator-annotations

subsets:
  common:
    description: Classes converted from schemas/common/*.json
  observables:
    description: Classes converted from schemas/observables/*.json
  sdos:
    description: Classes converted from schemas/sdos/*.json
  sros:
    description: Classes converted from schemas/sros/*.json

types:
  stix_identifier:
    base: str
    uri: xsd:string
    pattern: "^[a-z][a-z0-9-]*--[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  stix_type_name:
    base: str
    uri: xsd:string
    pattern: "^([a-z][a-z0-9]*)+(-[a-z0-9]+)*-?$"

enums:
  SpecVersionEnum:
    description: STIX specification versions allowed by the upstream JSON Schema.
    permissible_values:
      "2.0":
      "2.1":
  OpinionEnum:
    description: Opinion vocabulary from STIX opinion object.
    permissible_values:
      strongly-disagree:
      disagree:
      neutral:
      agree:
      strongly-agree:
  ExtensionTypeEnum:
    description: Extension-definition extension type vocabulary.
    permissible_values:
      new-sdo:
      new-sco:
      new-sro:
      property-extension:
      toplevel-property-extension:
  RegistryDataTypeEnum:
    description: Windows registry data type vocabulary.
    permissible_values:
      REG_NONE:
      REG_SZ:
      REG_EXPAND_SZ:
      REG_BINARY:
      REG_DWORD:
      REG_DWORD_BIG_ENDIAN:
      REG_DWORD_LITTLE_ENDIAN:
      REG_LINK:
      REG_MULTI_SZ:
      REG_RESOURCE_LIST:
      REG_FULL_RESOURCE_DESCRIPTION:
      REG_RESOURCE_REQUIREMENTS_LIST:
      REG_QWORD:
      REG_INVALID_TYPE:

  # ── Open Vocabulary Enums (STIX 2.1 §2.1) ─────────────────────────────────
