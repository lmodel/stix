      insider-disgruntled:
      nation-state:
      sensationalist:
      spy:
      terrorist:
      unknown:

  ThreatActorRoleOv:
    description: "Open vocabulary for threat actor role (threat-actor-role-ov). Additional string values are allowed."
    annotations:
      open_vocabulary: "true"
    permissible_values:
      agent:
