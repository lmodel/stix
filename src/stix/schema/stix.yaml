      government:
      emergency-services:
      government-local:
      government-national:
      government-public-services:
      government-regional:
      healthcare:
      hospitality-leisure:
      infrastructure:
      infrastructure-dams:
      infrastructure-nuclear:
      infrastructure-water:
      insurance:
      manufacturing:
      mining:
      non-profit:
      pharmaceuticals:
      retail:
      technology:
      telecommunications:
      transportation:
      utilities:

